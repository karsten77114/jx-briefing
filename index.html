<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>JX Briefing</title>
<style>
:root {
  --bg: #070c14;
  --surface: #0f1824;
  --card: #162030;
  --border: #1e3050;
  --accent: #f59e0b;
  --blue: #60a5fa;
  --green: #22c55e;
  --red: #ef4444;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #475569;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 14px;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ── Topbar ──────────────────────────────────────── */
.topbar {
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 18px;
  gap: 16px;
  flex-shrink: 0;
}
.logo {
  font-size: 18px;
  font-weight: 800;
  color: var(--accent);
  letter-spacing: -0.3px;
  white-space: nowrap;
}
.flight-pill {
  display: none;
  align-items: center;
  gap: 8px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 13px;
}
.flight-pill.show { display: flex; }
.fp-fn { color: var(--accent); font-weight: 700; font-size: 15px; }
.fp-route { color: var(--text); font-weight: 500; }
.fp-meta { color: var(--text3); font-size: 12px; }
.topbar-spacer { flex: 1; }
.print-btn {
  display: none;
  padding: 6px 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text2);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
}
.print-btn:hover { border-color: var(--accent); color: var(--accent); }
.print-btn.show { display: block; }

/* ── Main layout ─────────────────────────────────── */
.layout {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ── Left panel ──────────────────────────────────── */
.left {
  width: 300px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  padding: 16px;
  gap: 14px;
}
.left::-webkit-scrollbar { width: 4px; }
.left::-webkit-scrollbar-thumb { background: var(--border); }

.input-block { display: flex; flex-direction: column; gap: 7px; }
.input-lbl {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text3);
  display: flex;
  align-items: center;
  gap: 8px;
}
.lbl-check { color: var(--green); font-size: 11px; }
.lbl-clear {
  margin-left: auto;
  background: none;
  border: none;
  color: var(--text3);
  font-size: 11px;
  cursor: pointer;
  padding: 0;
}
.lbl-clear:hover { color: var(--red); }

textarea {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text2);
  font-family: 'SF Mono', 'Courier New', monospace;
  font-size: 11px;
  line-height: 1.55;
  padding: 10px;
  resize: none;
  transition: border-color 0.2s;
  width: 100%;
}
textarea:focus { outline: none; border-color: var(--accent); }
textarea.filled { border-color: #22c55e60; }
textarea::placeholder { color: var(--text3); font-family: -apple-system, sans-serif; font-size: 12px; line-height: 1.6; }

.hint-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 12px;
  color: var(--text3);
  line-height: 1.65;
}
.hint-box b { color: var(--text2); }

/* ── Right panel ─────────────────────────────────── */
.right {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Tabs ────────────────────────────────────────── */
.tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.tab {
  padding: 12px 20px;
  cursor: pointer;
  color: var(--text3);
  border-bottom: 2px solid transparent;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.15s;
  user-select: none;
}
.tab:hover { color: var(--text2); }
.tab.on { color: var(--accent); border-bottom-color: var(--accent); }

/* ── Tab body ────────────────────────────────────── */
.body {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}
.body::-webkit-scrollbar { width: 6px; }
.body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Empty state ─────────────────────────────────── */
.empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 16px;
  color: var(--text3);
  text-align: center;
  padding: 40px;
}
.empty .e-icon { font-size: 52px; opacity: 0.45; }
.empty h3 { font-size: 17px; color: var(--text2); font-weight: 600; }
.empty p { font-size: 13px; line-height: 1.7; max-width: 300px; }

/* ── Section title ───────────────────────────────── */
.s-title {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text3);
  margin: 20px 0 10px;
}
.s-title:first-child { margin-top: 0; }

/* ── Cards ───────────────────────────────────────── */
.card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
}
.card.ca { border-color: #f59e0b30; background: #1a1400; }
.card.cb { border-color: #60a5fa30; background: #0e1825; }
.c-lbl { font-size: 10px; text-transform: uppercase; color: var(--text3); letter-spacing: 0.07em; margin-bottom: 6px; }
.c-val { font-size: 26px; font-weight: 700; line-height: 1; }
.card.ca .c-val { color: var(--accent); }
.card.cb .c-val { color: var(--blue); }
.c-unit { font-size: 11px; color: var(--text3); margin-top: 3px; }

/* ── Fuel breakdown ──────────────────────────────── */
.f-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 10px;
}
.f-row { margin-bottom: 11px; }
.f-row:last-child { margin-bottom: 0; }
.f-top { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; }
.f-lbl { color: var(--text2); }
.f-val { font-weight: 600; }
.f-pct { color: var(--text3); font-size: 11px; font-weight: 400; }
.f-bar { height: 3px; background: #0d1524; border-radius: 2px; overflow: hidden; }
.f-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }

/* ── Weight table ────────────────────────────────── */
.w-tbl {
  width: 100%;
  border-collapse: collapse;
  background: var(--card);
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.w-tbl th {
  font-size: 10px;
  text-transform: uppercase;
  color: var(--text3);
  padding: 8px 12px;
  border-bottom: 1px solid var(--bg);
  letter-spacing: 0.07em;
}
.w-tbl th:first-child { text-align: left; }
.w-tbl th:not(:first-child) { text-align: right; }
.w-tbl td { padding: 10px 12px; border-bottom: 1px solid var(--bg); }
.w-tbl tr:last-child td { border-bottom: none; }
.w-tbl td:not(:first-child) { text-align: right; }
.td-p { color: var(--accent); font-weight: 600; }
.td-l { color: var(--text3); font-size: 12px; }

/* ── Info rows ───────────────────────────────────── */
.i-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px;
  background: var(--card);
  border-radius: 7px;
  margin-bottom: 5px;
  border: 1px solid var(--border);
}
.i-lbl { color: var(--text2); font-size: 13px; }
.i-val { color: var(--text); font-weight: 500; }

/* ── Mono block ──────────────────────────────────── */
.mono {
  font-family: 'SF Mono', 'Courier New', monospace;
  font-size: 11.5px;
  color: #7a96b0;
  white-space: pre;
  overflow-x: auto;
  padding: 14px;
  background: var(--bg);
  border-radius: 8px;
  border: 1px solid var(--border);
  line-height: 1.65;
}
.mono::-webkit-scrollbar { height: 4px; }
.mono::-webkit-scrollbar-thumb { background: var(--border); }

/* ── NOTAM ───────────────────────────────────────── */
.n-sec { margin-bottom: 16px; }
.n-hdr {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--accent);
  padding: 7px 12px;
  background: #150f00;
  border-left: 3px solid var(--accent);
  border-radius: 4px;
  margin-bottom: 8px;
}
.cr { color: var(--red); }
.ca2 { color: var(--accent); }
.cg { color: var(--green); }
.cbl { color: var(--blue); }

/* ── Mobile ──────────────────────────────────────── */
@media (max-width: 700px) {
  .left { width: 100%; border-right: none; border-bottom: 1px solid var(--border); flex-shrink: 0; max-height: 260px; }
  .layout { flex-direction: column; }
  .fp-meta { display: none; }
}

/* ── Print ───────────────────────────────────────── */
@media print {
  .topbar, .left, .tabs { display: none; }
  .layout { display: block; }
  .right { display: block; }
  .body { overflow: visible; padding: 0; }
  body { background: white; color: black; }
  .card, .f-box, .w-tbl, .i-row { border: 1px solid #ccc; }
  .card.ca, .card.cb { background: #f9f9f9; }
  .f-bar, .f-fill { display: none; }
}
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="logo">✈ JX Briefing</div>
  <div class="flight-pill" id="fpill">
    <span class="fp-fn" id="fpFn"></span>
    <span class="fp-route" id="fpRoute"></span>
    <span class="fp-meta" id="fpMeta"></span>
  </div>
  <div class="topbar-spacer"></div>
  <button class="print-btn" id="printBtn" onclick="window.print()">🖨 列印</button>
</div>

<div class="layout">
  <!-- Left: paste inputs -->
  <div class="left">
    <div class="input-block">
      <div class="input-lbl">
        OFP 文字
        <span class="lbl-check" id="ofpOk" style="display:none">✓ 已解析</span>
        <button class="lbl-clear" id="ofpClr" style="display:none" onclick="clearInput('ofp')">清除</button>
      </div>
      <textarea id="ofpTa" rows="13"
        placeholder="從 LIDO 複製 OFP 原文貼在此處

操作步驟：
① 在 LIDO 點開航班 → OFP 頁籤
② 點擊文字區域，全選（⌘A）
③ 複製（⌘C）→ 貼上到此（⌘V）

系統將自動解析所有數據"
        oninput="onInput('ofp',this)"></textarea>
    </div>

    <div class="input-block">
      <div class="input-lbl">
        NOTAM 文字
        <span class="lbl-check" id="notamOk" style="display:none">✓ 已解析</span>
        <button class="lbl-clear" id="notamClr" style="display:none" onclick="clearInput('notam')">清除</button>
      </div>
      <textarea id="notamTa" rows="8"
        placeholder="從 LIDO NOTAM 頁籤複製貼上（選填）"
        oninput="onInput('notam',this)"></textarea>
    </div>

    <div class="hint-box">
      <b>資料安全</b><br>
      所有解析在你的瀏覽器本機完成，<br>文字不會上傳至任何伺服器。
    </div>
  </div>

  <!-- Right: results -->
  <div class="right">
    <div class="tabs">
      <div class="tab on" data-t="ov" onclick="switchTab('ov')">概覽</div>
      <div class="tab" data-t="notam" onclick="switchTab('notam')">NOTAM</div>
      <div class="tab" data-t="raw" onclick="switchTab('raw')">OFP 原文</div>
    </div>
    <div class="body" id="body">
      <div class="empty">
        <div class="e-icon">📋</div>
        <h3>貼上 OFP 開始使用</h3>
        <p>將 LIDO OFP 頁籤的完整文字複製貼到左側，系統會自動解析並顯示燃油、重量與航程資訊。</p>
      </div>
    </div>
  </div>
</div>

<script>
var state = { ofp: null, notam: null };
var curTab = 'ov';

// ── OFP Parser ──────────────────────────────────────────────
function parseOFP(txt) {
  if (!txt || txt.trim().length < 80) return null;
  var r = {}, m;

  // Flight number (SJX850, JX850, etc.)
  m = txt.match(/(?:SJX|JX)\s*(\d{3,4})/); if (m) r.fn = m[1];

  // Date
  m = txt.match(/\b(\d{2}(?:JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC)\d{2})\b/i);
  if (m) r.date = m[1].toUpperCase();

  // Registration
  m = txt.match(/\b(B-?\d{5}|HL\d{4}|JA\d{4})\b/); if (m) r.reg = m[1];

  // Aircraft type
  m = txt.match(/A350|A330|A321|A320|B737|B777|B787/i); if (m) r.acType = m[0].toUpperCase();
  if (!r.acType) { m = txt.match(/A35[09]|A359/); if (m) r.acType = 'A350'; }

  // Route: RCTP/RJCC or dep/dest from OFP header
  m = txt.match(/\b(RC[A-Z]{2}|RJ[A-Z]{2}|VH[A-Z]{2}|WS[A-Z]{2}|VT[A-Z]{2}|ZS[A-Z]{2}|OE[A-Z]{2})\/(RC[A-Z]{2}|RJ[A-Z]{2}|VH[A-Z]{2}|WS[A-Z]{2}|VT[A-Z]{2}|ZS[A-Z]{2}|OE[A-Z]{2})\b/);
  if (m) { r.dep = m[1]; r.dest = m[2]; }

  // Times
  m = txt.match(/STD\s+\d{4}L\s+(\d{4})Z/); if (m) r.std = m[1]+'Z';
  m = txt.match(/STA\s+\d{4}L\s+(\d{4})Z/); if (m) r.sta = m[1]+'Z';
  m = txt.match(/ETE\s+(\d+)\.(\d+)/); if (m) r.ete = m[1]+':'+m[2];

  // Fuel line: BOF RJCC 15575 02.57 1542NM ... W/C P071
  m = txt.match(/BOF\s+\w+\s+(\d+)\s+[\d.]+\s+(\d+)NM.*?W\/C\s+([PM])(\d+)/s);
  if (m) { r.tripFuel=+m[1]; r.dist=+m[2]; r.wcSign=m[3]; r.wcVal=+m[4]; }
  else {
    m = txt.match(/BOF\s+\w+\s+(\d+)/); if (m) r.tripFuel=+m[1];
    m = txt.match(/(\d+)NM/); if (m) r.dist=+m[1];
    m = txt.match(/W\/C\s+([PM])(\d+)/); if (m) { r.wcSign=m[1]; r.wcVal=+m[2]; }
  }

  // Alternate
  m = txt.match(/ALTN\s+(\w+)\s+(\d+)/); if (m) { r.altnApt=m[1]; r.altnFuel=+m[2]; }
  m = txt.match(/FINAL RES\s+(\d+)/); if (m) r.finalFuel=+m[1];
  m = txt.match(/^CONT\s+(\d+)/m); if (m) r.contFuel=+m[1];
  m = txt.match(/^EXTRA\s+(\d+)/m); if (m) r.extraFuel=+m[1];
  m = txt.match(/^ADD WXX\s+(\d+)/m); if (m) r.wxFuel=+m[1];
  m = txt.match(/DEST HOLD\s+(\d+)/); if (m) r.holdFuel=+m[1];
  m = txt.match(/^REQUIRED\s+(\d+)/m); if (m) r.reqFuel=+m[1];
  m = txt.match(/^TAKEOFF\s+(\d+)/m); if (m) r.toFuel=+m[1];
  m = txt.match(/^TAXI\s+(\d+)/m); if (m) r.taxiFuel=+m[1];

  // Block = Takeoff + Taxi
  if (r.toFuel && r.taxiFuel) r.blockFuel = r.toFuel + r.taxiFuel;
  else if (r.toFuel) r.blockFuel = r.toFuel;

  // Weights: ZFW 195.7 / 165.1
  m = txt.match(/ZFW\s+([\d.]+)\s*\/\s*([\d.]+)/); if (m) { r.zfwLim=+m[1]; r.zfwPln=+m[2]; }
  m = txt.match(/TOW\s+([\d.]+)\s*\/\s*([\d.]+)/); if (m) { r.towLim=+m[1]; r.towPln=+m[2]; }
  m = txt.match(/LDW\s+([\d.]+)\s*\/\s*([\d.]+)/); if (m) { r.ldwLim=+m[1]; r.ldwPln=+m[2]; }
  m = txt.match(/PAYLOAD:\s*([\d.]+)/); if (m) r.payload=+m[1];

  // OFP number
  m = txt.match(/OFP-NR:\s*([\d\/]+)/); if (!m) m = txt.match(/OFP\s+([\d]+\/[\d]+\/[\d]+)/);
  if (m) r.ofpNr = m[1];

  return (r.fn || r.tripFuel || r.toFuel) ? r : null;
}

// ── NOTAM Parser ────────────────────────────────────────────
function parseNOTAM(txt) {
  if (!txt || txt.trim().length < 20) return null;
  var sections = {}, re = /={5,}\n([^\n]+)\n={5,}/g, last = null, idx = 0, m;
  while ((m = re.exec(txt)) !== null) {
    if (last) sections[last] = txt.slice(idx, m.index).trim();
    last = m[1].trim(); idx = m.index + m[0].length + 1;
  }
  if (last) sections[last] = txt.slice(idx).trim();
  return Object.keys(sections).length ? sections : null;
}

// ── Helpers ──────────────────────────────────────────────────
function esc(s) { var d=document.createElement('div'); d.textContent=String(s); return d.innerHTML; }
function fkg(n) { return n ? (+n).toLocaleString() : '—'; }
function pctCol(p) { return p>95?'var(--red)':p>87?'var(--accent)':'var(--green)'; }

function fRow(lbl, val, block) {
  if (!val || val===0) return '';
  var pct = block ? Math.round(val/block*100) : 0;
  var col = lbl.includes('Trip')||lbl.includes('航程') ? 'var(--blue)' :
            lbl.includes('Extra')||lbl.includes('額外') ? 'var(--green)' : 'var(--text3)';
  return '<div class="f-row"><div class="f-top"><span class="f-lbl">'+lbl+'</span>' +
    '<span class="f-val">'+fkg(val)+' <span class="f-pct">kg ('+pct+'%)</span></span></div>' +
    '<div class="f-bar"><div class="f-fill" style="width:'+pct+'%;background:'+col+'"></div></div></div>';
}

function wRow(lbl, pln, lim) {
  if (!pln||!lim) return '<tr><td>'+lbl+'</td><td class="td-p">—</td><td class="td-l">—</td><td>—</td></tr>';
  var p = Math.round(pln/lim*100);
  return '<tr><td>'+lbl+'</td><td class="td-p">'+pln.toFixed(1)+'</td><td class="td-l">'+lim.toFixed(1)+'</td>' +
    '<td style="text-align:right"><span style="color:'+pctCol(p)+';font-weight:700">'+p+'%</span></td></tr>';
}

function iRow(lbl, val) {
  return '<div class="i-row"><span class="i-lbl">'+lbl+'</span><span class="i-val">'+val+'</span></div>';
}

// ── Renderers ────────────────────────────────────────────────
function renderOv() {
  var o = state.ofp;
  if (!o) return '<div class="empty"><div class="e-icon">📋</div><h3>貼上 OFP 開始使用</h3><p>將 LIDO OFP 頁籤的完整文字複製貼到左側，系統會自動解析並顯示燃油、重量與航程資訊。</p></div>';

  var block = o.blockFuel || o.toFuel || 1;
  var wc = o.wcVal!=null
    ? '<span class="'+(o.wcSign==='P'?'cg':'cr')+'">'+(o.wcSign==='P'?'+':'-')+o.wcVal+' kt ('+(o.wcSign==='P'?'順風':'逆風')+')</span>'
    : '—';

  var h = '';

  // Big fuel cards
  h += '<div class="s-title">飛行燃油 (KG)</div>';
  h += '<div class="card-grid">';
  h += '<div class="card ca"><div class="c-lbl">起飛油量 TAKEOFF</div><div class="c-val">'+fkg(o.toFuel)+'</div><div class="c-unit">kg</div></div>';
  h += '<div class="card cb"><div class="c-lbl">加油量 BLOCK</div><div class="c-val">'+fkg(o.blockFuel)+'</div><div class="c-unit">kg</div></div>';
  h += '</div>';

  // Fuel breakdown
  h += '<div class="f-box">';
  h += fRow('航程油量 (Trip)', o.tripFuel, block);
  h += fRow('備降油量 (Altn)', o.altnFuel, block);
  h += fRow('最終儲備 (Final Res)', o.finalFuel, block);
  h += fRow('不可預見 (Cont)', o.contFuel, block);
  if (o.wxFuel)  h += fRow('天氣加油 (WXX)', o.wxFuel, block);
  if (o.holdFuel) h += fRow('空中等待 (Hold)', o.holdFuel, block);
  if (o.taxiFuel) h += fRow('滑行油量 (Taxi)', o.taxiFuel, block);
  if (o.extraFuel) h += fRow('額外油量 (Extra)', o.extraFuel, block);
  h += '</div>';

  // Weight table
  if (o.zfwPln || o.towPln || o.ldwPln) {
    h += '<div class="s-title">重量 (公噸)</div>';
    h += '<table class="w-tbl"><thead><tr><th>項目</th><th>計畫值</th><th>限制值</th><th>使用率</th></tr></thead><tbody>';
    h += wRow('ZFW', o.zfwPln, o.zfwLim);
    h += wRow('TOW', o.towPln, o.towLim);
    h += wRow('LDW', o.ldwPln, o.ldwLim);
    h += '</tbody></table>';
  }

  // Info rows
  h += '<div class="s-title">航程資訊</div>';
  if (o.std && o.sta) h += iRow('STD / STA', o.std + ' → ' + o.sta);
  if (o.ete)  h += iRow('預計飛行時間 (ETE)', o.ete);
  if (o.dist) h += iRow('飛行距離', o.dist + ' NM');
  h += iRow('風分量 (W/C)', wc);
  if (o.altnApt) h += iRow('備降機場 (Alternate)', o.altnApt + (o.altnFuel ? '　' + fkg(o.altnFuel) + ' kg' : ''));
  if (o.payload) h += iRow('酬載 (Payload)', o.payload + ' T');
  if (o.ofpNr)   h += iRow('OFP 版本', o.ofpNr);
  if (o.reg)     h += iRow('機尾號', o.reg);

  return h;
}

function renderNotam() {
  var s = state.notam;
  if (!s) return '<div class="empty"><div class="e-icon">📡</div><h3>貼上 NOTAM 文字</h3><p>將 LIDO NOTAM 頁籤的完整文字複製貼到左側。系統自動依機場分區整理，並高亮 CLOSED / WARNING 等重要項目。</p></div>';

  var order = ['DEPARTURE AIRPORT','DESTINATION AIRPORT','ALTERNATE AIRPORT','EN-ROUTE','ENROUTE'];
  var keys = order.concat(Object.keys(s).filter(function(k){return order.indexOf(k)<0;}));
  var seen = {}, h = '';

  keys.forEach(function(k) {
    if (seen[k] || !s[k] || !s[k].trim()) return;
    seen[k] = 1;
    var hi = esc(s[k])
      .replace(/\b(CLOSED|CLSD)\b/g,'<span class="cr" style="font-weight:700">$1</span>')
      .replace(/\b(WARNING|CAUTION|DANGER)\b/g,'<span class="ca2" style="font-weight:700">$1</span>')
      .replace(/\b(RWY|ILS|LOC|NDB|VOR|DME|GP|PAPI)\b/g,'<span class="cbl">$1</span>')
      .replace(/\bNIL\b/g,'<span class="cg">NIL</span>');
    h += '<div class="n-sec"><div class="n-hdr">'+esc(k)+'</div><div class="mono" style="font-size:11px">'+hi+'</div></div>';
  });

  return h || '<div class="empty"><div class="e-icon">✅</div><h3>無 NOTAM 項目</h3></div>';
}

function renderRaw() {
  var txt = document.getElementById('ofpTa').value.trim();
  if (!txt) return '<div class="empty"><div class="e-icon">📄</div><h3>尚未貼上 OFP</h3></div>';
  return '<div class="mono">'+esc(txt)+'</div>';
}

function render() {
  var el = document.getElementById('body');
  if (curTab==='ov') el.innerHTML = renderOv();
  else if (curTab==='notam') el.innerHTML = renderNotam();
  else el.innerHTML = renderRaw();
}

// ── Tab switching ────────────────────────────────────────────
function switchTab(t) {
  curTab = t;
  document.querySelectorAll('.tab').forEach(function(el){ el.classList.toggle('on', el.dataset.t===t); });
  render();
}

// ── Input handlers ───────────────────────────────────────────
function onInput(type, el) {
  var txt = el.value.trim();
  var ok = document.getElementById(type+'Ok');
  var clr = document.getElementById(type+'Clr');

  if (type === 'ofp') {
    state.ofp = txt.length > 80 ? parseOFP(txt) : null;
    var parsed = !!state.ofp;
    el.classList.toggle('filled', parsed);
    ok.style.display = parsed ? 'inline' : 'none';
    clr.style.display = txt.length ? 'inline' : 'none';
    updateHeader();
    save('jxbf_ofp', el.value);
  } else {
    state.notam = txt.length > 30 ? parseNOTAM(txt) : null;
    var parsed = !!state.notam;
    el.classList.toggle('filled', parsed);
    ok.style.display = parsed ? 'inline' : 'none';
    clr.style.display = txt.length ? 'inline' : 'none';
    save('jxbf_notam', el.value);
  }
  render();
}

function clearInput(type) {
  var el = document.getElementById(type+'Ta');
  el.value = '';
  onInput(type, el);
}

// ── Header update ─────────────────────────────────────────────
function updateHeader() {
  var o = state.ofp;
  var pill = document.getElementById('fpill');
  var btn = document.getElementById('printBtn');
  if (o && (o.fn || o.dep)) {
    document.getElementById('fpFn').textContent = o.fn ? 'JX'+o.fn : '';
    document.getElementById('fpRoute').textContent = (o.dep||'---') + ' → ' + (o.dest||'---');
    document.getElementById('fpMeta').textContent = [o.date, o.reg].filter(Boolean).join('  ·  ');
    pill.classList.add('show');
    btn.classList.add('show');
  } else {
    pill.classList.remove('show');
    btn.classList.remove('show');
  }
}

// ── LocalStorage ──────────────────────────────────────────────
var saveTimer = {};
function save(key, val) {
  clearTimeout(saveTimer[key]);
  saveTimer[key] = setTimeout(function(){ try { localStorage.setItem(key, val); } catch(e){} }, 800);
}

// Restore on load
(function() {
  try {
    var ofp = localStorage.getItem('jxbf_ofp');
    var notam = localStorage.getItem('jxbf_notam');
    if (ofp) { var el=document.getElementById('ofpTa'); el.value=ofp; onInput('ofp',el); }
    if (notam) { var el=document.getElementById('notamTa'); el.value=notam; onInput('notam',el); }
  } catch(e) {}
})();

render();
</script>
</body>
</html>
